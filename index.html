<!-- index.html -->
<!DOCTYPE html>
<html lang="en" class="mode-1 light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Bunny's Journey</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400,600,700&family=Inter:wght@400;500;700&display=swap"
    rel="stylesheet"
  />

  <link rel="stylesheet" href="styles/styles.css" />

  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
</head>

<body>
  <main class="stage">
    <!-- STICKY STORY (bunny always centered) -->
    <div class="sticky-scene" id="stickyScene">
      <div class="frame">
        <div class="bg" aria-hidden="true">
          <div class="light"></div>
          <div class="dust"></div>
        </div>

        <!-- Code layer (behind bunny) -->
        <div class="codeLayer" id="codeLayer" aria-hidden="true">
          <pre class="codeBlock" id="codeBlock"></pre>
        </div>

        <div class="scene">
          <!-- Title text sits between the ears in screen-space -->
          <div class="title-text" id="titleText" aria-hidden="true">
            <h1 id="titleH1">The<br>Bunny's Journey.</h1>
            <p id="titleSub">scroll to begin</p>
          </div>

          <!-- Bunny wrapper -->
          <div class="bunnyWrap" id="bunnyWrap">
            <!-- HAY: only appears during FIRST CONTACT -->
            <div class="hayWrap" id="hayWrap" aria-hidden="true">
              <svg class="hay" viewBox="0 0 400 200" xmlns="http://www.w3.org/2000/svg">
                <g>
                  <line x1="50" y1="130" x2="140" y2="125" stroke="#4A6B32" stroke-width="2.5" stroke-linecap="round"/>
                  <line x1="60" y1="135" x2="155" y2="128" stroke="#5A7C3E" stroke-width="2.5" stroke-linecap="round"/>
                  <line x1="80" y1="132" x2="165" y2="130" stroke="#4A6B32" stroke-width="2.5" stroke-linecap="round"/>
                  <line x1="100" y1="138" x2="180" y2="133" stroke="#5A7C3E" stroke-width="3" stroke-linecap="round"/>
                  <line x1="120" y1="134" x2="200" y2="131" stroke="#4A6B32" stroke-width="2.5" stroke-linecap="round"/>
                  <line x1="140" y1="140" x2="220" y2="135" stroke="#5A7C3E" stroke-width="2.5" stroke-linecap="round"/>
                  <line x1="160" y1="136" x2="240" y2="132" stroke="#4A6B32" stroke-width="3" stroke-linecap="round"/>
                  <line x1="180" y1="142" x2="260" y2="138" stroke="#5A7C3E" stroke-width="2.5" stroke-linecap="round"/>
                  <line x1="200" y1="137" x2="280" y2="134" stroke="#4A6B32" stroke-width="2.5" stroke-linecap="round"/>
                  <line x1="220" y1="141" x2="300" y2="139" stroke="#5A7C3E" stroke-width="2.5" stroke-linecap="round"/>
                  <line x1="240" y1="133" x2="320" y2="130" stroke="#4A6B32" stroke-width="2.5" stroke-linecap="round"/>

                  <line x1="45" y1="125" x2="130" y2="118" stroke="#6B8E47" stroke-width="2.5" stroke-linecap="round"/>
                  <line x1="70" y1="128" x2="150" y2="122" stroke="#7BA056" stroke-width="2.5" stroke-linecap="round"/>
                  <line x1="95" y1="130" x2="175" y2="125" stroke="#6B8E47" stroke-width="3" stroke-linecap="round"/>
                  <line x1="115" y1="126" x2="195" y2="120" stroke="#7BA056" stroke-width="2.5" stroke-linecap="round"/>
                  <line x1="135" y1="132" x2="215" y2="128" stroke="#6B8E47" stroke-width="3" stroke-linecap="round"/>
                  <line x1="155" y1="129" x2="235" y2="123" stroke="#7BA056" stroke-width="2.5" stroke-linecap="round"/>
                  <line x1="175" y1="134" x2="255" y2="129" stroke="#6B8E47" stroke-width="2.5" stroke-linecap="round"/>
                  <line x1="195" y1="131" x2="275" y2="126" stroke="#7BA056" stroke-width="2.5" stroke-linecap="round"/>
                  <line x1="215" y1="135" x2="295" y2="131" stroke="#6B8E47" stroke-width="2.5" stroke-linecap="round"/>
                  <line x1="235" y1="127" x2="315" y2="123" stroke="#7BA056" stroke-width="2.5" stroke-linecap="round"/>
                  <line x1="255" y1="130" x2="335" y2="128" stroke="#6B8E47" stroke-width="2.5" stroke-linecap="round"/>

                  <line x1="85" y1="127" x2="160" y2="123" stroke="#7BA056" stroke-width="2" stroke-linecap="round"/>
                  <line x1="125" y1="129" x2="200" y2="124" stroke="#6B8E47" stroke-width="2" stroke-linecap="round"/>
                  <line x1="165" y1="131" x2="240" y2="127" stroke="#7BA056" stroke-width="2" stroke-linecap="round"/>
                  <line x1="205" y1="128" x2="280" y2="125" stroke="#6B8E47" stroke-width="2" stroke-linecap="round"/>
                  <line x1="245" y1="132" x2="320" y2="129" stroke="#7BA056" stroke-width="2" stroke-linecap="round"/>

                  <line x1="55" y1="120" x2="135" y2="112" stroke="#8CB357" stroke-width="2.5" stroke-linecap="round"/>
                  <line x1="75" y1="123" x2="160" y2="115" stroke="#9DC766" stroke-width="2.5" stroke-linecap="round"/>
                  <line x1="100" y1="121" x2="180" y2="116" stroke="#8CB357" stroke-width="3" stroke-linecap="round"/>
                  <line x1="125" y1="118" x2="205" y2="112" stroke="#9DC766" stroke-width="2.5" stroke-linecap="round"/>
                  <line x1="150" y1="124" x2="230" y2="118" stroke="#8CB357" stroke-width="3" stroke-linecap="round"/>
                  <line x1="170" y1="120" x2="250" y2="115" stroke="#9DC766" stroke-width="2.5" stroke-linecap="round"/>
                  <line x1="190" y1="125" x2="270" y2="120" stroke="#8CB357" stroke-width="2.5" stroke-linecap="round"/>
                  <line x1="210" y1="122" x2="290" y2="117" stroke="#9DC766" stroke-width="2.5" stroke-linecap="round"/>
                  <line x1="230" y1="119" x2="310" y2="114" stroke="#8CB357" stroke-width="2.5" stroke-linecap="round"/>
                  <line x1="250" y1="124" x2="330" y2="120" stroke="#9DC766" stroke-width="2.5" stroke-linecap="round"/>

                  <line x1="65" y1="116" x2="140" y2="108" stroke="#A8D96E" stroke-width="2.5" stroke-linecap="round"/>
                  <line x1="90" y1="118" x2="170" y2="110" stroke="#B5E67A" stroke-width="2" stroke-linecap="round"/>
                  <line x1="110" y1="114" x2="190" y2="107" stroke="#A8D96E" stroke-width="2.5" stroke-linecap="round"/>
                  <line x1="140" y1="117" x2="220" y2="111" stroke="#B5E67A" stroke-width="2" stroke-linecap="round"/>
                  <line x1="165" y1="115" x2="245" y2="108" stroke="#A8D96E" stroke-width="2.5" stroke-linecap="round"/>
                  <line x1="185" y1="119" x2="265" y2="113" stroke="#B5E67A" stroke-width="2" stroke-linecap="round"/>
                  <line x1="205" y1="116" x2="285" y2="110" stroke="#A8D96E" stroke-width="2.5" stroke-linecap="round"/>
                  <line x1="225" y1="113" x2="305" y2="107" stroke="#B5E67A" stroke-width="2" stroke-linecap="round"/>
                  <line x1="245" y1="117" x2="325" y2="112" stroke="#A8D96E" stroke-width="2.5" stroke-linecap="round"/>

                  <line x1="80" y1="124" x2="130" y2="120" stroke="#7BA056" stroke-width="2" stroke-linecap="round"/>
                  <line x1="130" y1="122" x2="175" y2="119" stroke="#8CB357" stroke-width="2" stroke-linecap="round"/>
                  <line x1="170" y1="126" x2="220" y2="122" stroke="#7BA056" stroke-width="2" stroke-linecap="round"/>
                  <line x1="210" y1="121" x2="255" y2="118" stroke="#8CB357" stroke-width="2" stroke-linecap="round"/>
                  <line x1="250" y1="125" x2="295" y2="122" stroke="#7BA056" stroke-width="2" stroke-linecap="round"/>
                </g>
              </svg>
            </div>

            <!-- ORIGINAL BUNNY: intro + arrival -->
            <svg
              id="bunnyIntro"
              class="bunny bunny--active"
              viewBox="0 0 400 420"
              xmlns="http://www.w3.org/2000/svg"
              aria-label="Bunny sitting, seen from behind"
            >
              <g id="bunnyGroup">
                <g transform="rotate(8 120 375)">
                  <ellipse cx="120" cy="375" rx="44" ry="20" fill="#7A5C3A"/>
                  <ellipse cx="120" cy="375" rx="33" ry="14" fill="#A0826D"/>
                </g>
                <g transform="rotate(-8 280 375)">
                  <ellipse cx="280" cy="375" rx="44" ry="20" fill="#7A5C3A"/>
                  <ellipse cx="280" cy="375" rx="33" ry="14" fill="#A0826D"/>
                </g>
                <ellipse cx="150" cy="318" rx="58" ry="68" fill="#7A5C3A"/>
                <ellipse cx="250" cy="318" rx="58" ry="68" fill="#7A5C3A"/>
                <ellipse cx="200" cy="268" rx="98" ry="115" fill="#8B6F47"/>
                <ellipse cx="200" cy="258" rx="38" ry="92" fill="#7A5C3A" opacity="0.28"/>
                <ellipse cx="200" cy="200" rx="76" ry="55" fill="#8B6F47"/>
                <ellipse cx="200" cy="148" rx="58" ry="56" fill="#8B6F47"/>
                <ellipse cx="200" cy="148" rx="34" ry="38" fill="#7A5C3A" opacity="0.18"/>
                <g transform="rotate(-22 160 85)">
                  <ellipse cx="160" cy="85" rx="21" ry="65" fill="#7A5C3A"/>
                  <ellipse cx="160" cy="85" rx="13" ry="50" fill="#A0826D" opacity="0.55"/>
                </g>
                <g transform="rotate(22 240 83)">
                  <ellipse cx="240" cy="83" rx="21" ry="65" fill="#8B6F47"/>
                  <ellipse cx="240" cy="83" rx="13" ry="50" fill="#A0826D" opacity="0.65"/>
                </g>
                <circle cx="200" cy="358" r="30" fill="#8B6F47"/>
                <circle cx="200" cy="358" r="23" fill="#D4C4B0" opacity="0.92"/>
                <circle cx="194" cy="352" r="9" fill="#EDE3D5" opacity="0.7"/>
              </g>
            </svg>

            <!-- NEW BUNNY: first contact and onward -->
            <svg
              class="bunny bunny--story"
              id="bunnyStory"
              viewBox="0 0 400 400"
              xmlns="http://www.w3.org/2000/svg"
              aria-hidden="true"
            >
              <g id="bunnyGroup">
                <ellipse id="legBack" class="leg" cx="280" cy="320" rx="35" ry="50" fill="#7A5C3A"/>
                <ellipse cx="220" cy="260" rx="100" ry="80" fill="#8B6F47"/>
                <ellipse cx="180" cy="270" rx="45" ry="50" fill="#A0826D" opacity="0.6"/>
                <circle cx="310" cy="270" r="28" fill="#8B6F47"/>
                <circle cx="310" cy="270" r="20" fill="#D4C4B0" opacity="0.8"/>
                <ellipse cx="150" cy="220" rx="40" ry="50" fill="#8B6F47"/>

                <g id="nearEar" class="earPath earPath--right">
                  <g id="nearEarKick">
                    <ellipse cx="135" cy="150" rx="25" ry="65" fill="#8B6F47" transform="rotate(15 135 150)"/>
                    <ellipse cx="135" cy="150" rx="18" ry="52" fill="#A0826D" transform="rotate(15 135 150)"/>
                  </g>
                </g>

                <ellipse cx="120" cy="180" rx="55" ry="60" fill="#8B6F47"/>
                <ellipse cx="100" cy="195" rx="25" ry="30" fill="#A0826D" opacity="0.7"/>

                <g id="ears" transform="translate(0 -25)">
                  <g id="farEarKick" class="earPath earPath--left">
                    <ellipse cx="125" cy="145" rx="20" ry="55" fill="#7A5C3A" transform="rotate(-10 115 145)"/>
                  </g>
                </g>

                <circle cx="105" cy="175" r="9" fill="#3B2614"/>
                <circle cx="107" cy="173" r="3" fill="#FFFFFF"/>
                <ellipse id="nose" cx="75" cy="190" rx="8" ry="10" fill="#6B5544"/>
                <path d="M 75 200 Q 80 205 85 203" stroke="#6B5544" stroke-width="2" fill="none" stroke-linecap="round"/>

                <g id="legFrontFarGroup">
                  <ellipse id="legFrontFar" class="leg" cx="165" cy="320" rx="22" ry="45" fill="#7A5C3A"/>
                </g>

                <g id="legFrontNearGroup">
                  <ellipse id="legFrontNear" class="leg" cx="190" cy="325" rx="24" ry="48" fill="#8B6F47"/>
                  <ellipse id="pawPadNear" cx="190" cy="345" rx="15" ry="20" fill="#A0826D"/>
                </g>

                <g transform="rotate(-75 285 345)">
                  <g id="backPawKick">
                    <ellipse cx="285" cy="345" rx="40" ry="25" fill="#8B6F47"/>
                    <ellipse cx="285" cy="345" rx="30" ry="18" fill="#A0826D"/>
                  </g>
                </g>

                <line x1="75" y1="185" x2="35" y2="178" stroke="#6B5544" stroke-width="1.5" opacity="0.6"/>
                <line x1="75" y1="190" x2="30" y2="190" stroke="#6B5544" stroke-width="1.5" opacity="0.6"/>
                <line x1="75" y1="195" x2="35" y2="202" stroke="#6B5544" stroke-width="1.5" opacity="0.6"/>
              </g>
            </svg>

          <!--NAMING THINGS BUNNY -->
            <svg
  class="bunny bunny--face"
  id="bunnyFace"
  viewBox="0 0 400 400"
  xmlns="http://www.w3.org/2000/svg"
  aria-hidden="true"
>
  <!-- Left ear -->
  <g class="ear-left">
    <ellipse
      cx="140" cy="120" rx="35" ry="80"
      fill="#8B6F47"
      transform="rotate(-15 140 120)"
    />
    <ellipse
      cx="140" cy="120" rx="22" ry="65"
      fill="#A0826D"
      transform="rotate(-15 140 120)"
    />
  </g>

  <!-- Right ear -->
  <g class="ear-right">
    <ellipse
      cx="260" cy="120" rx="35" ry="80"
      fill="#8B6F47"
      transform="rotate(15 260 120)"
    />
    <ellipse
      cx="260" cy="120" rx="22" ry="65"
      fill="#A0826D"
      transform="rotate(15 260 120)"
    />
  </g>

  <!-- Head -->
  <ellipse cx="200" cy="220" rx="85" ry="95" fill="#8B6F47"/>

  <!-- Cheeks -->
  <ellipse cx="150" cy="240" rx="30" ry="35" fill="#A0826D" opacity="0.7"/>
  <ellipse cx="250" cy="240" rx="30" ry="35" fill="#A0826D" opacity="0.7"/>

  <!-- Left eye -->
  <circle cx="160" cy="210" r="12" fill="#3B2614"/>
  <circle cx="163" cy="207" r="4" fill="#FFFFFF"/>

  <!-- Right eye -->
  <circle cx="240" cy="210" r="12" fill="#3B2614"/>
  <circle cx="243" cy="207" r="4" fill="#FFFFFF"/>

  <!-- Nose -->
  <ellipse cx="200" cy="250" rx="10" ry="8" fill="#6B5544"/>

  <!-- Mouth -->
  <path d="M 200 260 L 200 270" stroke="#6B5544" stroke-width="2" stroke-linecap="round"/>
  <path d="M 200 270 Q 185 280 175 275" stroke="#6B5544" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M 200 270 Q 215 280 225 275" stroke="#6B5544" stroke-width="2" fill="none" stroke-linecap="round"/>

  <!-- Left whiskers -->
  <line x1="150" y1="245" x2="90" y2="235" stroke="#6B5544" stroke-width="1.5" opacity="0.6"/>
  <line x1="150" y1="250" x2="85" y2="250" stroke="#6B5544" stroke-width="1.5" opacity="0.6"/>
  <line x1="150" y1="255" x2="90" y2="265" stroke="#6B5544" stroke-width="1.5" opacity="0.6"/>

  <!-- Right whiskers -->
  <line x1="250" y1="245" x2="310" y2="235" stroke="#6B5544" stroke-width="1.5" opacity="0.6"/>
  <line x1="250" y1="250" x2="315" y2="250" stroke="#6B5544" stroke-width="1.5" opacity="0.6"/>
  <line x1="250" y1="255" x2="310" y2="265" stroke="#6B5544" stroke-width="1.5" opacity="0.6"/>
</svg>

          </div>
        </div>

        <!-- Caption Area -->
        <div class="captionArea" id="captionArea" aria-live="polite">
          <div class="captionKicker" id="captionKicker">section 2</div>
          <div class="caption" id="captionText"></div>
          <div class="captionSmall" id="captionSmall"></div>
        </div>
      </div>
    </div>

    <!-- SCROLL TRACK -->
    <div class="track" id="track">
      <section class="step step--intro" data-step="0" aria-label="Intro"></section>

      <section class="step" data-step="1" aria-label="Section 2"></section>
      <section class="step" data-step="2" aria-label="Section 3"></section>
      <section class="step" data-step="3" aria-label="Section 4"></section>
      <section class="step" data-step="4" aria-label="Section 5"></section>
      <section class="step" data-step="5" aria-label="Section 6"></section>
      <section class="step" data-step="6" aria-label="Section 7"></section>
    </div>
  </main>

  <script src="js/main.js"></script>
</body>
</html>
